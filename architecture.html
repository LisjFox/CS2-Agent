<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CS2-AI-COACH — 代码架构图</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #0f172a;
    --fg: #e5e7eb;
    --muted: #a3adbd;
    --line: #94a3b8;
    --neutral: #334155;
    --input: #1e3a5f;
    --process: #2e1a47;
    --process2: #1a3a3a;
    --storage: #0f3d3d;
    --external: #3d2e0f;
    --risk: #3d1515;
    --highlight: #3b82f6;
    --highlight2: #8b5cf6;
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 13px/1.4 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  main {
    width: 100%;
    max-width: 1280px;
    padding: 12px 16px;
  }
  svg {
    width: 100%;
    height: auto;
    display: block;
    aspect-ratio: 16 / 9;
  }
  .title { font-size: 20px; font-weight: 700; fill: var(--fg); }
  .subtitle { font-size: 11px; fill: var(--muted); }
  .label { font-size: 12px; font-weight: 600; fill: var(--fg); }
  .sublabel { font-size: 9px; fill: #cbd5e1; }
  .label-white { font-size: 12px; font-weight: 600; fill: #fff; }
  .small { font-size: 9px; fill: var(--muted); }
  .node { stroke: var(--line); stroke-width: 1; rx: 5; ry: 5; }
  .neutral { fill: var(--neutral); }
  .input { fill: var(--input); }
  .process { fill: var(--process); }
  .process2 { fill: var(--process2); }
  .storage { fill: var(--storage); }
  .external { fill: var(--external); }
  .risk { fill: var(--risk); }
  .edge { stroke: var(--line); stroke-width: 1.5; fill: none; }
  .edge-b { stroke: var(--highlight); stroke-width: 1.5; fill: none; }
  .edge-p { stroke: var(--highlight2); stroke-width: 1.5; fill: none; }
  .zone { fill: none; stroke: var(--line); stroke-width: 1; stroke-dasharray: 5 4; opacity: 0.6; }
  .hl { fill: var(--highlight); }
  .hl2 { fill: var(--highlight2); }
  text { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
</style>
